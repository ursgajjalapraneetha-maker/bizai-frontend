<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BizAI</title>
    <link rel="stylesheet" href="static/css/style.css">

<body>

<header>
    <nav>

<main>
    <h1>Login</h1>

    <form>

        <label for="email">Email</label>
        <input
            id="email"
            name="email"
            type="email"
            required>

        <label for="password">Password</label>
        <input
            id="password"
            name="password"
            type="password"
            required>

        <button type="submit">Login</button>

    </form>
</main>

</body>
